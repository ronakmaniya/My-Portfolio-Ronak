<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Contact | My Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/layout-loader.js" defer></script>
  </head>

  <body>
    <div id="site-header"></div>

    <main>
      <section class="contact-us-sec">
        <div class="contact-us layout">
          <h2 class="text-center uppercase pd-30" style="color: turquoise">
            Contact Us
          </h2>
          <hr />

          <div class="contact-grid">
            <div class="contact-info-card">
              <h3>Contact Details</h3>
              <h5>Mobile No.: +91 9875049414</h5>
              <h5>
                Email:
                <a href="mailto:23ceuog085@ddu.ac.in">23ceuog085@ddu.ac.in</a>
              </h5>
              <h5>Address: DDU Computer Engineering Department</h5>
              <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3681.2893481232654!2d72.8776339750188!3d22.68027012901606!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e5bfc088639a5%3A0xe8b7d3eebf4321cf!2sDDU%20Computer%20Engineering%20Department!5e0!3m2!1sen!2sin!4v1713974741712!5m2!1sen!2sin"
                width="100%"
                height="220"
                style="border: 0"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>

            <div class="form-card">
              <h3>Send a Message</h3>
              <form
                class="contact-form"
                name="contact"
                method="POST"
                data-netlify="true"
              >
                <input type="hidden" name="form-name" value="contact" />
                <div class="form-row">
                  <label class="field-label" for="contact-name"
                    >Your Name</label
                  >
                  <input
                    class="field-input"
                    type="text"
                    id="contact-name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                  />
                </div>

                <div class="form-row">
                  <label class="field-label" for="contact-email"
                    >Your Email</label
                  >
                  <input
                    class="field-input"
                    type="email"
                    id="contact-email"
                    name="email"
                    placeholder="Enter your email"
                    required
                  />
                </div>

                <div class="form-row">
                  <label class="field-label" for="contact-number"
                    >Your Number</label
                  >
                  <input
                    class="field-input"
                    type="tel"
                    id="contact-number"
                    name="number"
                    placeholder="Enter your phone number"
                    pattern="[0-9]{10}"
                    required
                  />
                </div>

                <div class="form-row">
                  <label class="field-label" for="contact-message"
                    >Message</label
                  >
                  <textarea
                    class="field-input field-textarea"
                    id="contact-message"
                    name="message"
                    placeholder="Write your message"
                    rows="4"
                  ></textarea>
                </div>

                <div class="form-actions">
                  <button class="btn btn2" type="submit">Submit</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>
  </body>
</html>
